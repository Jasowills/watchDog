<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <meta
      name="description"
      content="Watchdog — uptime monitoring, error tracing, and incident response for SaaS teams."
    />
    <title>Watchdog — observability for SaaS teams</title>
    <script>
      // Dark-mode first: only drop the dark class if the user explicitly chose light.
      try {
        if (localStorage.getItem('watchdog-theme') === 'light') {
          document.documentElement.classList.remove('dark')
        }
      } catch (e) {
        /* keep the dark default */
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
