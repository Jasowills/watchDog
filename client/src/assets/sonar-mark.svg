<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160">
  <defs>
    <style>
      .hex-fill { fill: #111111; }
      .hex-stroke { fill: none; stroke: #e8e8e8; stroke-width: 1; }
      .eye-ring { fill: none; stroke: #e8e8e8; }
      .eye-dot { fill: #e8e8e8; }
      .scan { stroke: #e8e8e8; opacity: 0.25; stroke-width: 0.6; }
      .tick-line { stroke: #444444; stroke-width: 0.6; }
      .pulse-dim { stroke: #333333; fill: none; stroke-width: 0.75; }
      .pulse-hot { stroke: #e8e8e8; fill: none; stroke-width: 1.5; }
      .dot-hot { fill: #e8e8e8; }
      .dot-dim { fill: #333333; }
      .corner { stroke: #2a2a2a; stroke-width: 0.75; fill: none; }
    </style>
  </defs>

  <rect width="160" height="160" fill="#0a0a0a" rx="4"/>

  <!-- corner brackets -->
  <polyline points="10,10 20,10" class="corner"/>
  <polyline points="10,10 10,20" class="corner"/>
  <polyline points="150,10 140,10" class="corner"/>
  <polyline points="150,10 150,20" class="corner"/>
  <polyline points="10,150 20,150" class="corner"/>
  <polyline points="10,150 10,140" class="corner"/>
  <polyline points="150,150 140,150" class="corner"/>
  <polyline points="150,150 150,140" class="corner"/>

  <!-- hexagon -->
  <polygon points="80,18 130,47 130,105 80,134 30,105 30,47" class="hex-fill"/>
  <polygon points="80,18 130,47 130,105 80,134 30,105 30,47" class="hex-stroke"/>

  <!-- scan line -->
  <line x1="80" y1="18" x2="80" y2="134" class="scan"/>

  <!-- eye rings -->
  <circle cx="80" cy="76" r="28" class="eye-ring" stroke-width="0.9"/>
  <circle cx="80" cy="76" r="12" class="eye-ring" stroke-width="0.9"/>
  <circle cx="80" cy="76" r="4" class="eye-dot"/>

  <!-- hex ticks -->
  <line x1="42" y1="47" x2="42" y2="52" class="tick-line"/>
  <line x1="60" y1="28" x2="60" y2="33" class="tick-line"/>
  <line x1="100" y1="28" x2="100" y2="33" class="tick-line"/>
  <line x1="118" y1="47" x2="118" y2="52" class="tick-line"/>
  <line x1="118" y1="100" x2="118" y2="105" class="tick-line"/>
  <line x1="100" y1="119" x2="100" y2="124" class="tick-line"/>
  <line x1="60" y1="119" x2="60" y2="124" class="tick-line"/>
  <line x1="42" y1="100" x2="42" y2="105" class="tick-line"/>

  <!-- pulse trace -->
  <polyline points="10,148 28,148 36,136 44,158 52,136 60,158 68,148 80,148 86,132 92,164 98,148 148,148" class="pulse-dim"/>
  <polyline points="36,136 44,158 52,136 60,158 68,148" class="pulse-hot"/>
  <circle cx="44" cy="158" r="2.5" class="dot-hot"/>
  <circle cx="52" cy="136" r="2.5" class="dot-hot"/>
</svg>
