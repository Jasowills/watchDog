<svg xmlns="http://www.w3.org/2000/svg" width="480" height="160" viewBox="0 0 480 160">
  <defs>
    <style>
      .hex-fill { fill: #111111; }
      .hex-stroke { stroke: #e8e8e8; fill: none; stroke-width: 0.75; }
      .eye-ring { fill: none; stroke: #e8e8e8; }
      .eye-dot { fill: #e8e8e8; }
      .scan { stroke: #e8e8e8; opacity: 0.3; }
      .tick-line { stroke: #444444; stroke-width: 0.5; }
      .pulse-dim { stroke: #333333; fill: none; stroke-width: 0.75; }
      .pulse-hot { stroke: #e8e8e8; fill: none; stroke-width: 1.25; }
      .dot-hot { fill: #e8e8e8; }
      .dot-dim { fill: #333333; }
      .wm { fill: #e8e8e8; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-weight: 500; font-size: 22px; letter-spacing: 8px; }
      .sub { fill: #555555; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-weight: 400; font-size: 9px; letter-spacing: 4px; }
      .rule { stroke: #333333; stroke-width: 0.4; }
      .corner { stroke: #2a2a2a; stroke-width: 0.75; fill: none; }
    </style>
  </defs>

  <rect width="480" height="160" fill="#0a0a0a" rx="4"/>

  <!-- corner brackets -->
  <polyline points="18,18 32,18" class="corner"/>
  <polyline points="18,18 18,32" class="corner"/>
  <polyline points="462,18 448,18" class="corner"/>
  <polyline points="462,18 462,32" class="corner"/>
  <polyline points="18,142 32,142" class="corner"/>
  <polyline points="18,142 18,128" class="corner"/>
  <polyline points="462,142 448,142" class="corner"/>
  <polyline points="462,142 462,128" class="corner"/>

  <!-- hexagon -->
  <polygon points="80,22 118,44 118,88 80,110 42,88 42,44" class="hex-fill"/>
  <polygon points="80,22 118,44 118,88 80,110 42,88 42,44" class="hex-stroke"/>

  <!-- scan line -->
  <line x1="80" y1="22" x2="80" y2="110" class="scan" stroke-width="0.5"/>

  <!-- eye rings -->
  <circle cx="80" cy="66" r="18" class="eye-ring" stroke-width="0.75"/>
  <circle cx="80" cy="66" r="8" class="eye-ring" stroke-width="0.75"/>
  <circle cx="80" cy="66" r="2.5" class="eye-dot"/>

  <!-- hex tick marks -->
  <line x1="50" y1="44" x2="50" y2="48" class="tick-line"/>
  <line x1="64" y1="28" x2="64" y2="32" class="tick-line"/>
  <line x1="96" y1="28" x2="96" y2="32" class="tick-line"/>
  <line x1="110" y1="44" x2="110" y2="48" class="tick-line"/>
  <line x1="110" y1="84" x2="110" y2="88" class="tick-line"/>
  <line x1="96" y1="100" x2="96" y2="104" class="tick-line"/>
  <line x1="64" y1="100" x2="64" y2="104" class="tick-line"/>
  <line x1="50" y1="84" x2="50" y2="88" class="tick-line"/>

  <!-- pulse trace under hex -->
  <polyline points="20,128 38,128 44,118 50,138 56,118 62,138 68,128 80,128 85,112 90,144 95,128 150,128" class="pulse-dim"/>
  <polyline points="44,118 50,138 56,118 62,138 68,128" class="pulse-hot"/>
  <circle cx="50" cy="138" r="2" class="dot-hot"/>
  <circle cx="56" cy="118" r="2" class="dot-hot"/>
  <circle cx="20" cy="128" r="1.5" class="dot-dim"/>
  <circle cx="150" cy="128" r="1.5" class="dot-dim"/>

  <!-- wordmark -->
  <text x="178" y="78" class="wm">WATCHDOG</text>
  <text x="178" y="98" class="sub">OBSERVABILITY PLATFORM</text>

  <!-- rules flanking tagline -->
  <line x1="178" y1="108" x2="354" y2="108" class="rule"/>
</svg>
